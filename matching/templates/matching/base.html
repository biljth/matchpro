<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Loan Matching System{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f9ff;
            margin: 0;
            padding: 0;
        }

        .header {
            background: linear-gradient(135deg, #0b5ed7, #1e88e5);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .header h2 {
            margin: 0;
            font-size: 24px;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 30px auto;
        }

        .form-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }

        .result-card {
            background: white;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
            border-left: 5px solid #1e88e5;
        }

        .bank-name {
            font-size: 18px;
            font-weight: bold;
            color: #0b5ed7;
        }

        .score {
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
        }

        ul {
            list-style: none;
            padding-left: 0;
        }

        ul li {
            font-size: 14px;
            color: #333;
            margin-bottom: 4px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1e88e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0b5ed7;
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 15px;
            background: #4c575d;
            color: white;
            padding: 8px 12px;
            text-decoration: none;
            border-radius: 6px;
        }

        .btn-back:hover {
            background: #5a6268;
        }

        .pks-badge {
            background: #28a745;
            color: white;
            font-size: 12px;
            padding: 2px 6px;
            margin-left: 6px;
            border-radius: 6px;
        }

        .history-card {
            background: white;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .history-card:hover {
            transform: scale(1.01);
        }

        .name {
            font-weight: bold;
            color: #0b5ed7;
        }

        .actions .btn {
            padding: 6px 10px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
        }

        .view {
            background: #1e88e5;
            color: white;
        }

        .delete {
            background: #dc3545;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            margin-right: 8px;
        }

        .box {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
        }

        .title {
            color: #0b5ed7;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .reasons-list {
            list-style: none;
            padding-left: 0;
        }

        .reasons-list li {
            margin-bottom: 6px;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 13px;
        }

        /* STATUS COLORS */
        .success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .fail {
            background: #fdecea;
            color: #c62828;
        }

        .warn {
            background: #fff8e1;
            color: #f9a825;
        }

        .btn-history {
            display: inline-block;
            background: #6f42c1;
            color: white;
            padding: 8px 12px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
        }

        .btn-history:hover {
            background: #5a32a3;
        }


    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

<div class="header">
    <h2>Bank Matching System</h2>
    <p>Temukan bank terbaik sesuai profil nasabah</p>
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

{% block extra_js %}{% endblock %}

</body>
</html>
